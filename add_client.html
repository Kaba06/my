{% extends 'core/base.html' %}
{% block content %}
<h2>Add Client</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3"><label>First Name</label><input type="text" name="first_name" class="form-control" required></div>
    <div class="mb-3"><label>Last Name</label><input type="text" name="last_name" class="form-control" required></div>
    <div class="mb-3"><label>National ID</label><input type="text" name="national_id" class="form-control" required></div>
    <div class="mb-3"><label>Phone</label><input type="text" name="phone" class="form-control" required></div>
    <div class="mb-3"><label>Address</label><textarea name="address" class="form-control"></textarea></div>
    <div class="mb-3"><label>Email</label><input type="email" name="email" class="form-control"></div>
    <button type="submit" class="btn btn-success">Save</button>
    <a href="{% url 'client_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
