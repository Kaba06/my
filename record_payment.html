{% extends 'core/base.html' %}
{% block content %}
<h2>Record Loan Payment</h2>
<form method="post" id="paymentForm">
    {% csrf_token %}
    <div class="mb-3"><label>Client</label><select name="client" id="clientSelect" class="form-control" required>{% for c in clients %}<option value="{{ c.id }}">{{ c.full_name }}</option>{% endfor %}</select></div>
    <div class="mb-3"><label>Installment</label><select name="installment" id="installmentSelect" class="form-control" required><option value="">Select client first</option></select></div>
    <div class="mb-3"><label>Amount ($)</label><input type="number" step="0.01" name="amount" class="form-control" required></div>
    <button type="submit" class="btn btn-success">Record Payment</button>
</form>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$('#clientSelect').change(function(){
    var clientId = $(this).val();
    $.get('/get_installments/' + clientId + '/', function(data){
        var $installment = $('#installmentSelect');
        $installment.empty();
        if(data.length === 0){
            $installment.append('<option value="">No pending installments</option>');
        } else {
            $.each(data, function(i, item){
                $installment.append('<option value="' + item.id + '">' + item.label + '</option>');
            });
        }
    });
});
</script>
{% endblock %}
